<html lang="en">
<head>
    <meta charset="UTF-8">

        * { box-sizing: border-box; }
        body { background-color: #060D1A; color: #F1F5F9; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(16px); border: 1px solid rgba(148, 163, 184, 0.08); }
        .glass-bright { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(148, 163, 184, 0.12); }
        .glow-blue { box-shadow: 0 0 20px rgba(14, 165, 233, 0.15); }
        .glow-green { box-shadow: 0 0 20px rgba(16, 185, 129, 0.15); }
        .glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.15); }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.85); } }
        @keyframes slide-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.4); border-radius: 2px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .log-content { white-space: pre-wrap; word-break: break-word; font-family: 'JetBrains Mono', 'Fira Code', monospace; }
        textarea.auto-height { min-height: 52px; max-height: 180px; resize: none; }
        .nav-item { transition: all 0.15s ease; }
        .nav-item:hover { background: rgba(14, 165, 233, 0.08); }
        .nav-item.active { background: rgba(14, 165, 233, 0.12); border-left: 2px solid #0ea5e9; }
        .agent-card:hover { border-color: rgba(14, 165, 233, 0.35); transform: translateY(-1px); transition: all 0.2s ease; }
        .stat-card { transition: all 0.2s ease; }
        .stat-card:hover { transform: translateY(-2px); }
        .task-row:hover { background: rgba(30, 41, 59, 0.6); }
        .suggestion-item:hover { background: rgba(14, 165, 233, 0.08); }
        .health-bar { height: 4px; border-radius: 2px; background: rgba(30,41,59,0.8); overflow: hidden; }
        .health-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
        .login-bg { background: radial-gradient(ellipse at 20% 50%, rgba(14, 165, 233, 0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 60%), #060D1A; }
        .dispatch-bubble-user { background: linear-gradient(135deg, rgba(14,165,233,0.15), rgba(99,102,241,0.1)); border-color: rgba(14,165,233,0.25); }
        .dispatch-bubble-agent { background: rgba(15, 23, 42, 0.8); border-color: rgba(100,116,139,0.2); }
        .dispatch-bubble-error { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.25); }
        .dispatch-bubble-success { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.25); }

    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' },
                        surface: { 900: '#060D1A', 800: '#0F172A', 700: '#1E293B', 600: '#334155' }
                    }
                }
            }
        };

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const {

    Settings, Terminal, MessageSquare, Activity, ChevronRight, Play, Cpu, Box,

    MonitorCheck, Inbox, Circle, Dot

const API_BASE = "/army-api";
const FALLBACK_GOOGLE_CLIENT_ID = "1060185715012-siki6kjg9gd8vflp7oqv4uj7kj3laqjm.apps.googleusercontent.com";
const CHAT_STATE_KEY = "tm_dispatch_state_v2";
const AGENT_ALIASES = {
    integrator_agent: "integration_agent",
    integrationagent: "integration_agent",
    data_analyzer: "data_analyser",
};

const AGENT_LIST = [
    { id: "wordpress_tech",       name: "WP Tech",          icon: Globe,       color: "text-blue-400",    bg: "bg-blue-500/10",    category: "operations",  desc: "WordPress health, theme & plugin management" },
    { id: "seo_agent",            name: "SEO Master",        icon: Search,      color: "text-green-400",   bg: "bg-green-500/10",   category: "growth",      desc: "GA4, GSC audits, autonomous SEO pipeline" },
    { id: "data_analyser",        name: "Data Brain",        icon: Database,    color: "text-purple-400",  bg: "bg-purple-500/10",  category: "analytics",   desc: "MySQL queries, metrics, trend analysis" },
    { id: "integration_agent",    name: "Integrator",        icon: Layers,      color: "text-orange-400",  bg: "bg-orange-500/10",  category: "operations",  desc: "WooCommerce ↔ ERPNext sync & API bridge" },
    { id: "erpnext_agent",        name: "ERP Functional",    icon: Layout,      color: "text-cyan-400",    bg: "bg-cyan-500/10",    category: "operations",  desc: "Customer lookup, sales orders, ERP ops" },
    { id: "erpnext_dev_agent",    name: "ERP Developer",     icon: Settings,    color: "text-red-400",     bg: "bg-red-500/10",     category: "engineering", desc: "Doctype creation, bench lifecycle, schema mods" },
    { id: "server_agent",         name: "Server Guardian",   icon: ShieldAlert, color: "text-red-500",     bg: "bg-red-500/10",     category: "operations",  desc: "System audit, service recovery, resource ops" },
    { id: "devops_agent",         name: "SRE / DevOps",      icon: Shield,      color: "text-emerald-400", bg: "bg-emerald-500/10", category: "operations",  desc: "Deprecated → routes to server_agent", deprecated: true },
    { id: "growth_agent",         name: "Growth CGO",        icon: TrendingUp,  color: "text-yellow-400",  bg: "bg-yellow-500/10",  category: "growth",      desc: "Multi-agent growth orchestration & planning" },
    { id: "campaign_planner_agent", name: "Campaign Planner", icon: Play,       color: "text-pink-400",    bg: "bg-pink-500/10",    category: "marketing",   desc: "Budget allocation, cross-channel dispatch" },
    { id: "email_marketing_agent", name: "Email Strategist", icon: Mail,        color: "text-sky-400",     bg: "bg-sky-500/10",     category: "marketing",   desc: "Newsletter templates, SMTP management" },
    { id: "google_agent",         name: "Google Ecosystem",  icon: Activity,    color: "text-blue-500",    bg: "bg-blue-500/10",    category: "analytics",   desc: "GA4 fetch, GSC, multi-site Google APIs" },
    { id: "fb_campaign_manager",  name: "Meta Manager",      icon: Share2,      color: "text-indigo-400",  bg: "bg-indigo-500/10",  category: "marketing",   desc: "Meta Ads API, bidding & budget optimization" },
    { id: "smo_agent",            name: "SMO Specialist",    icon: Share2,      color: "text-teal-400",    bg: "bg-teal-500/10",    category: "marketing",   desc: "Social media optimization & engagement" },
    { id: "design_agent",         name: "UI/UX Designer",    icon: Palette,     color: "text-violet-400",  bg: "bg-violet-500/10",  category: "engineering", desc: "Creative UI/UX prompt generation" },
    { id: "skill_agent",          name: "Skill Scout",       icon: Zap,         color: "text-yellow-300",  bg: "bg-yellow-500/10",  category: "knowledge",   desc: "Web research, doc fetching, training dispatch" },
    { id: "training_agent",       name: "Master Trainer",    icon: BookOpen,    color: "text-orange-300",  bg: "bg-orange-500/10",  category: "knowledge",   desc: "ChromaDB vector indexing, RAG knowledge prep" },
    { id: "agent_builder",        name: "Agent Architect",   icon: Hammer,      color: "text-blue-300",    bg: "bg-blue-500/10",    category: "engineering", desc: "Code generation for new agent modules" },
];

const CATEGORIES = {
    all:         { label: "All Agents", color: "text-slate-300" },
    operations:  { label: "Operations", color: "text-emerald-400" },
    growth:      { label: "Growth",     color: "text-yellow-400" },
    marketing:   { label: "Marketing",  color: "text-pink-400" },
    analytics:   { label: "Analytics",  color: "text-purple-400" },
    engineering: { label: "Engineering",color: "text-blue-400" },
    knowledge:   { label: "Knowledge",  color: "text-orange-400" },
};

const isMarketingAgentId = (agentId) => {
    const a = AGENT_LIST.find(x => x.id === agentId);
    return a?.category === "marketing";
};

// ─── Helpers ────────────────────────────────────────────────────────────────
const fmtTime = (ts) => ts ? new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '';
const fmtTimeShort = (ts) => ts ? new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
const fmtDate = (ts) => ts ? new Date(ts).toLocaleDateString([], { month: 'short', day: 'numeric' }) : '';
const fmtPct = (v) => v != null ? `${(v * 100).toFixed(1)}%` : '—';
const fmtScore = (v) => v != null ? `${v.toFixed(1)}` : '—';
const timeAgo = (ts) => {
    if (!ts) return '';
    const diff = Date.now() - new Date(ts).getTime();
    if (diff < 60000) return `${Math.floor(diff/1000)}s ago`;
    if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
    return `${Math.floor(diff/3600000)}h ago`;
};
const statusColor = (s) => {
    const m = { success:'text-emerald-400', error:'text-red-400', warning:'text-yellow-400', info:'text-brand-400', completed:'text-emerald-400', failed:'text-red-400', timed_out:'text-orange-400', accepted:'text-cyan-400', dispatched:'text-blue-400' };
    return m[s] || 'text-slate-400';
};
const statusDotColor = (s) => {
    const m = { success:'bg-emerald-400', error:'bg-red-400', warning:'bg-yellow-400', info:'bg-brand-500', completed:'bg-emerald-400', failed:'bg-red-400', timed_out:'bg-orange-400', accepted:'bg-cyan-400', dispatched:'bg-blue-400' };
    return m[s] || 'bg-slate-400';
};
const healthColor = (h) => ({ healthy: 'text-emerald-400', warning: 'text-yellow-400', critical: 'text-red-400' }[h] || 'text-slate-400');
const healthBg = (h) => ({ healthy: 'bg-emerald-400', warning: 'bg-yellow-400', critical: 'bg-red-400' }[h] || 'bg-slate-400');
const eventKey = (ev) => `${ev.task_id||''}|${ev.timestamp||''}|${ev.event_type||''}|${(ev.message||'').slice(0,60)}`;

// ─── StatusBadge ─────────────────────────────────────────────────────────────
const StatusBadge = ({ status, size = 'sm' }) => {
    const cfg = {
        success:   { bg: 'bg-emerald-500/15', text: 'text-emerald-400', border: 'border-emerald-500/30' },
        completed: { bg: 'bg-emerald-500/15', text: 'text-emerald-400', border: 'border-emerald-500/30' },
        error:     { bg: 'bg-red-500/15',     text: 'text-red-400',     border: 'border-red-500/30' },
        failed:    { bg: 'bg-red-500/15',     text: 'text-red-400',     border: 'border-red-500/30' },
        warning:   { bg: 'bg-yellow-500/15',  text: 'text-yellow-400',  border: 'border-yellow-500/30' },
        timed_out: { bg: 'bg-orange-500/15',  text: 'text-orange-400',  border: 'border-orange-500/30' },
        info:      { bg: 'bg-brand-500/15',   text: 'text-brand-400',   border: 'border-brand-500/30' },
        dispatched:{ bg: 'bg-blue-500/15',    text: 'text-blue-400',    border: 'border-blue-500/30' },
        accepted:  { bg: 'bg-cyan-500/15',    text: 'text-cyan-400',    border: 'border-cyan-500/30' },
        open:      { bg: 'bg-amber-500/15',   text: 'text-amber-400',   border: 'border-amber-500/30' },
        closed:    { bg: 'bg-slate-500/15',   text: 'text-slate-400',   border: 'border-slate-500/30' },
    };
    const c = cfg[status] || cfg.info;
    return (
        <span className={`tag ${c.bg} ${c.text} border ${c.border}`}>{status}</span>
    );
};

// ─── MiniBar ─────────────────────────────────────────────────────────────────
const MiniBar = ({ value, color = 'bg-brand-500', max = 100 }) => {
    const pct = Math.min(100, Math.max(0, (value / max) * 100));
    return (
        <div className="health-bar w-full">
            <div className={`health-fill ${color}`} style={{ width: `${pct}%` }} />
        </div>
    );
};

// ─── StatCard ─────────────────────────────────────────────────────────────────
const StatCard = ({ icon: Icon, label, value, sub, color = 'text-brand-400', trend }) => (
    <div className="glass-bright rounded-2xl p-5 stat-card">
        <div className="flex items-start justify-between mb-3">
            <div className={`p-2.5 rounded-xl ${color.replace('text-', 'bg-').replace('-400', '-500/10').replace('-500', '-500/10')}`}>
                <Icon size={18} className={color} />
            </div>
            {trend != null && (
                <span className={`text-xs font-semibold ${trend >= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                    {trend >= 0 ? '↑' : '↓'} {Math.abs(trend)}%
                </span>
            )}
        </div>
        <div className="text-2xl font-bold tracking-tight mb-1">{value ?? '—'}</div>
        <div className="text-xs text-slate-400 font-medium">{label}</div>
        {sub && <div className="text-[10px] text-slate-600 mt-1">{sub}</div>}
    </div>
);

// ─── Login Page ──────────────────────────────────────────────────────────────
const LoginPage = ({ onLogin, googleEnabled, googleClientId }) => {
    const [email, setEmail] = useState('');
    const [password, setPassword] = useState('');
    const [error, setError] = useState('');
    const [loading, setLoading] = useState(false);

    const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true); setError('');
        try {
            const res = await fetch(`${API_BASE}/login`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.token) { onLogin(data); }
            else setError(data.detail || 'Authentication failed');
        } catch { setError('Connection error — is the API server running?'); }
        setLoading(false);
    };

    return (
        <div className="login-bg min-h-screen flex items-center justify-center p-4">
            {/* Grid background */}
            <div className="fixed inset-0 pointer-events-none" style={{
                backgroundImage: 'linear-gradient(rgba(14,165,233,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(14,165,233,0.03) 1px, transparent 1px)',
                backgroundSize: '40px 40px'
            }} />
            <div className="w-full max-w-md relative">
                {/* Brand header */}
                <div className="text-center mb-8 fade-in">
                    <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-brand-500 to-indigo-600 mb-5 glow-blue">
                        <BrainCircuit size={32} className="text-white" />
                    </div>
                    <h1 className="text-3xl font-bold tracking-tight mb-1">TrueMatrix Swarm</h1>
                    <p className="text-slate-400 text-sm">AI Agent Command Center</p>
                    <div className="flex items-center justify-center gap-2 mt-3">
                        <span className="tag bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">18 Agents</span>
                        <span className="tag bg-brand-500/10 text-brand-400 border border-brand-500/20">Live Swarm</span>
                        <span className="tag bg-purple-500/10 text-purple-400 border border-purple-500/20">v2.0</span>
                    </div>
                </div>

                <div className="glass rounded-3xl p-8 slide-in glow-blue">
                    <h2 className="text-lg font-semibold mb-6 text-slate-200">Sign in to your workspace</h2>

                    {error && (
                        <div className="mb-5 p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm flex items-start gap-2">
                            <AlertTriangle size={15} className="mt-0.5 shrink-0" />
                            <span>{error}</span>
                        </div>
                    )}

                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div>
                            <label className="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Work Email</label>
                            <div className="relative">
                                <User size={15} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500" />
                                <input
                                    type="email" value={email} onChange={e => setEmail(e.target.value)}
                                    placeholder="you@company.com" required
                                    className="w-full bg-slate-950/80 border border-slate-700/60 rounded-xl py-3 pl-10 pr-4 text-sm focus:border-brand-500 outline-none transition-colors"
                                />
                            </div>
                        </div>
                        <div>
                            <label className="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Password</label>
                            <div className="relative">
                                <Lock size={15} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500" />
                                <input
                                    type="password" value={password} onChange={e => setPassword(e.target.value)}
                                    placeholder="••••••••" required
                                    className="w-full bg-slate-950/80 border border-slate-700/60 rounded-xl py-3 pl-10 pr-4 text-sm focus:border-brand-500 outline-none transition-colors"
                                />
                            </div>
                        </div>
                        <button
                            type="submit" disabled={loading}
                            className="w-full py-3.5 bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 text-white font-semibold rounded-xl transition-all shadow-lg shadow-brand-500/20 disabled:opacity-60 flex items-center justify-center gap-2"
                        >
                            {loading ? <><RefreshCw size={15} className="animate-spin" /> Signing in...</> : <><Rocket size={15} /> Enter Command Center</>}
                        </button>
                    </form>

                    {(googleEnabled || true) && (
                        <div className="mt-5 pt-5 border-t border-slate-800">
                            <button
                                disabled={!googleEnabled}
                                onClick={() => window.google?.accounts?.id?.prompt?.()}
                                className={`w-full flex items-center justify-center gap-3 py-3 rounded-xl font-semibold text-sm transition-all ${googleEnabled ? 'bg-white text-slate-900 hover:bg-slate-100' : 'bg-slate-800/50 text-slate-600 cursor-not-allowed'}`}
                            >
                                <svg width="16" height="16" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 002.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 01-7.18-2.54H1.83v2.07A8 8 0 008.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 010-3.04V5.41H1.83a8 8 0 000 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 001.83 5.4L4.5 7.49a4.77 4.77 0 014.48-3.3z"/></svg>
                                Continue with Google
                            </button>
                            {!googleEnabled && <p className="text-center text-[11px] text-slate-600 mt-2">Google login not configured on server</p>}
                        </div>
                    )}
                </div>

                <p className="text-center text-[11px] text-slate-600 mt-5">Secure JWT session · 24h expiry</p>
            </div>
        </div>
    );
};

// ─── Sidebar ─────────────────────────────────────────────────────────────────
const VIEWS = [
    { id: 'home',    label: 'Home',       icon: Home },
    { id: 'swarm',   label: 'Live Swarm', icon: Activity },
    { id: 'agents',  label: 'Agents',     icon: BrainCircuit },
    { id: 'tasks',   label: 'Tasks',      icon: ListChecks },
    { id: 'tracker', label: 'Dev Tracker',icon: GitBranch },
];

const Sidebar = ({ view, setView, selectedAgent, setSelectedAgent, agentMetrics }) => {
    const getAgentHealth = (agentId) => {
        if (!agentMetrics?.matrix) return null;
        return agentMetrics.matrix.find(m => m.agent_role === agentId);
    };

    return (
        <div className="w-64 glass border-r border-slate-800/60 flex flex-col h-screen sticky top-0">
            {/* Brand */}
            <div className="p-5 border-b border-slate-800/60">
                <div className="flex items-center gap-3">
                    <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-500 to-indigo-600 flex items-center justify-center shrink-0">
                        <BrainCircuit size={20} className="text-white" />
                    </div>
                    <div>
                        <div className="font-bold text-sm tracking-tight">TrueMatrix</div>
                        <div className="text-[10px] text-brand-400 font-semibold uppercase tracking-wider">Swarm HQ</div>
                    </div>
                </div>
            </div>

            {/* Navigation */}
            <div className="p-3 border-b border-slate-800/40">
                {VIEWS.map(v => (
                    <button
                        key={v.id}
                        onClick={() => { setView(v.id); setSelectedAgent(null); }}
                        className={`nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium mb-0.5 ${view === v.id && !selectedAgent ? 'active text-brand-400' : 'text-slate-400'}`}
                    >
                        <v.icon size={16} />
                        <span>{v.label}</span>
                        {v.id === 'agents' && <span className="ml-auto text-[10px] bg-slate-700/60 text-slate-400 px-1.5 py-0.5 rounded">{AGENT_LIST.length}</span>}
                    </button>
                ))}
            </div>

            {/* Agent quick-select */}
            <div className="flex-1 overflow-y-auto p-3 scrollbar-thin">
                <div className="text-[10px] font-bold text-slate-600 uppercase tracking-wider px-2 mb-2">Quick Dispatch</div>
                {AGENT_LIST.filter(a => !a.deprecated).map(agent => {
                    const m = getAgentHealth(agent.id);
                    return (
                        <button
                            key={agent.id}
                            onClick={() => { setSelectedAgent(agent); setView('swarm'); setShowSuggestions(false); }}
                            className={`nav-item w-full flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-xs font-medium mb-0.5 ${selectedAgent?.id === agent.id ? 'active text-brand-400' : 'text-slate-500 hover:text-slate-300'}`}
                        >
                            <agent.icon size={13} className={selectedAgent?.id === agent.id ? 'text-brand-400' : agent.color} />
                            <span className="truncate flex-1 text-left">{agent.name}</span>

                                <span className={`w-1.5 h-1.5 rounded-full shrink-0 ${m.health === 'healthy' ? 'bg-emerald-400' : m.health === 'warning' ? 'bg-yellow-400' : 'bg-red-400'}`} />
                            )}
                        </button>
                    );
                })}
            </div>
        </div>
    );
};

// ─── Home View ────────────────────────────────────────────────────────────────
const HomeView = ({ logs, agentMetrics, preflight, onDispatch, chatEvents }) => {
    const global = agentMetrics?.global || {};
    const matrix = agentMetrics?.matrix || [];
    const recs = agentMetrics?.recommendations || [];
    const recentLogs = logs.slice(0, 8);
    const healthyCt = matrix.filter(m => m.health === 'healthy').length;
    const criticalCt = matrix.filter(m => m.health === 'critical').length;
    const warnCt = matrix.filter(m => m.health === 'warning').length;
    // preflight.checks is an object {name: {ok, severity, detail}}
    const checksObj = preflight?.checks || {};
    const checksArr = Object.entries(checksObj).map(([k, v]) => ({ check: k, status: v.ok ? 'pass' : 'fail', detail: v.detail, severity: v.severity }));
    const failedChecks = checksArr.filter(c => c.status === 'fail').length;

    const recentTasks = useMemo(() => {
        const seen = new Set();
        return chatEvents.filter(ev => {
            if (!ev.task_id || seen.has(ev.task_id)) return false;
            seen.add(ev.task_id); return true;
        }).slice(-6).reverse();
    }, [chatEvents]);

    return (
        <div className="p-8 space-y-8 fade-in">
            <div>
                <h1 className="text-2xl font-bold tracking-tight mb-1">Command Center</h1>
                <p className="text-slate-400 text-sm">Real-time overview of your AI agent swarm</p>
            </div>

            {/* Stats row */}
            <div className="grid grid-cols-4 gap-4">
                <StatCard icon={BrainCircuit} label="Active Agents"    value={AGENT_LIST.filter(a=>!a.deprecated).length}  color="text-brand-400"   sub="17 operational" />
                <StatCard icon={Activity}     label="Total Executions" value={global.total_executions ?? 0}                color="text-purple-400"  sub="all-time" />
                <StatCard icon={CheckCircle}  label="Success Rate"     value={fmtPct(global.global_success_rate)}          color="text-emerald-400" />
                <StatCard icon={AlertTriangle} label="System Alerts"   value={failedChecks + criticalCt}  color={failedChecks + criticalCt > 0 ? "text-red-400" : "text-emerald-400"} sub={`${failedChecks} preflight · ${criticalCt} critical agents`} />
            </div>

            <div className="grid grid-cols-3 gap-6">
                {/* Agent Health Matrix */}
                <div className="col-span-2 glass-bright rounded-2xl p-5">
                    <div className="flex items-center justify-between mb-4">
                        <h3 className="font-semibold flex items-center gap-2 text-sm"><Gauge size={15} className="text-brand-400" /> Agent Health Matrix</h3>
                        <div className="flex items-center gap-3 text-[10px] font-semibold">
                            <span className="text-emerald-400">{healthyCt} healthy</span>
                            <span className="text-yellow-400">{warnCt} warning</span>
                            <span className="text-red-400">{criticalCt} critical</span>
                        </div>
                    </div>
                    <div className="space-y-2.5 max-h-72 overflow-y-auto scrollbar-thin pr-1">
                        {matrix.length === 0 && <div className="text-slate-600 text-sm text-center py-8">No execution data yet</div>}
                        {matrix.slice(0, 10).map(m => (
                            <div key={m.agent_role} className="flex items-center gap-3">
                                <div className="text-xs text-slate-400 font-mono w-36 truncate">{m.agent_role}</div>
                                <div className="flex-1">
                                    <MiniBar value={m.efficiency_score} max={100} color={m.health === 'healthy' ? 'bg-emerald-400' : m.health === 'warning' ? 'bg-yellow-400' : 'bg-red-400'} />
                                </div>
                                <div className="text-xs font-bold w-10 text-right" style={{color: m.health === 'healthy' ? '#34d399' : m.health === 'warning' ? '#fbbf24' : '#f87171'}}>{fmtScore(m.efficiency_score)}</div>
                                <div className="w-14 text-right text-[10px] text-slate-500">{m.total_executions} runs</div>
                            </div>
                        ))}
                    </div>
                </div>

                {/* System Health + Recommendations */}
                <div className="space-y-4">
                    <div className="glass-bright rounded-2xl p-5">
                        <h3 className="font-semibold flex items-center gap-2 text-sm mb-3"><MonitorCheck size={15} className="text-brand-400" /> System Health</h3>
                        <div className="space-y-2 max-h-32 overflow-y-auto scrollbar-thin">
                            {checksArr.length === 0 && <div className="text-slate-600 text-xs">No preflight data</div>}
                            {checksArr.slice(0, 6).map((c, i) => (
                                <div key={i} className="flex items-start gap-2 text-xs">
                                    {c.status === 'pass' ? <CheckCircle size={11} className="text-emerald-400 shrink-0 mt-0.5" /> : <X size={11} className="text-red-400 shrink-0 mt-0.5" />}
                                    <div className="min-w-0">
                                        <div className={`font-mono truncate ${c.status === 'pass' ? 'text-slate-400' : 'text-red-300'}`}>{c.check}</div>
                                        {c.status !== 'pass' && <div className="text-[10px] text-slate-600 truncate">{c.detail}</div>}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    {recs.length > 0 && (
                        <div className="glass-bright rounded-2xl p-5">
                            <h3 className="font-semibold flex items-center gap-2 text-sm mb-3"><AlertTriangle size={15} className="text-yellow-400" /> Recommendations</h3>
                            <div className="space-y-2 max-h-32 overflow-y-auto scrollbar-thin">
                                {recs.slice(0, 3).map((r, i) => (
                                    <p key={i} className="text-[11px] text-slate-400 border-l-2 border-yellow-500/40 pl-2">{r}</p>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            </div>

            <div className="grid grid-cols-2 gap-6">
                {/* Recent Activity */}
                <div className="glass-bright rounded-2xl p-5">
                    <h3 className="font-semibold flex items-center gap-2 text-sm mb-4"><Activity size={15} className="text-brand-400" /> Recent Activity</h3>
                    <div className="space-y-2">
                        {recentLogs.length === 0 && <div className="text-slate-600 text-sm text-center py-6">No activity yet</div>}
                        {recentLogs.map((log, i) => (
                            <div key={i} className="flex items-start gap-3 py-1.5 border-b border-slate-800/40 last:border-0">
                                <div className={`w-1.5 h-1.5 rounded-full mt-1.5 shrink-0 ${statusDotColor(log.status)}`} />
                                <div className="flex-1 min-w-0">
                                    <span className="text-[10px] font-bold text-brand-400 uppercase">{log.agent_role}</span>
                                    <p className="text-xs text-slate-400 truncate">{log.action_taken}</p>
                                </div>
                                <span className="text-[10px] text-slate-600 shrink-0">{fmtTimeShort(log.timestamp)}</span>
                            </div>
                        ))}
                    </div>
                </div>

                {/* Recent Tasks */}
                <div className="glass-bright rounded-2xl p-5">
                    <h3 className="font-semibold flex items-center gap-2 text-sm mb-4"><Inbox size={15} className="text-brand-400" /> Recent Tasks</h3>
                    <div className="space-y-2">
                        {recentTasks.length === 0 && <div className="text-slate-600 text-sm text-center py-6">No tasks dispatched yet</div>}
                        {recentTasks.map((ev, i) => (
                            <div key={i} className="flex items-center gap-3 py-1.5 border-b border-slate-800/40 last:border-0">
                                <StatusBadge status={ev.status} />
                                <div className="flex-1 min-w-0">
                                    <p className="text-xs text-slate-300 truncate">{ev.message}</p>
                                    <span className="text-[10px] text-slate-600 font-mono">{ev.task_id?.slice(0,8)}</span>
                                </div>
                                <span className="text-[10px] text-slate-600 shrink-0">{timeAgo(ev.timestamp)}</span>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        </div>
    );
};

const SwarmView = ({
    logs, chatEvents, activeTasks, selectedAgent, chatMessage, setChatMessage, handleChatSubmit,

}) => {

                                />

                                    className="bg-slate-900/60 border border-slate-700/60 rounded-lg px-2 py-1.5 text-xs outline-none focus:border-brand-500"
                                />
                                <input
                                    type="number" min="0" step="0.1"
                                    value={goalDraft.retryDelaySeconds}
                                    onChange={e => setGoalDraft(prev => ({ ...prev, retryDelaySeconds: e.target.value }))}
                                    placeholder="retry delay (s)"
                                    className="bg-slate-900/60 border border-slate-700/60 rounded-lg px-2 py-1.5 text-xs outline-none focus:border-brand-500"
                                />
                            </div>
                            <div className="flex items-center gap-2">

                                    </div>
                                </div>
                            ) : (
                                <div className="text-[11px] text-slate-600 mb-4 italic">No execution data</div>
                            )}

                            <span className={`tag ${CATEGORIES[agent.category]?.color?.replace('text-', 'bg-').replace('-400', '-500/10')} ${CATEGORIES[agent.category]?.color} border border-current/20`}>
                                {agent.category}
                            </span>
                        </div>
                    );
                })}
            </div>
        </div>
    );
};

// ─── Tasks View ───────────────────────────────────────────────────────────────
const TasksView = ({ chatEvents, activeTasks }) => {
    const [expandedTask, setExpandedTask] = useState(null);
    const [filterAgent, setFilterAgent] = useState('all');
    const [filterStatus, setFilterStatus] = useState('all');

    // Build task map
    const taskMap = useMemo(() => {
        const map = {};
        chatEvents.forEach(ev => {
            if (!ev.task_id) return;
            if (!map[ev.task_id]) map[ev.task_id] = { task_id: ev.task_id, events: [], agents: new Set(), lastStatus: null, firstTs: ev.timestamp, lastTs: ev.timestamp };
            map[ev.task_id].events.push(ev);
            if (ev.agent_role) map[ev.task_id].agents.add(ev.agent_role);
            map[ev.task_id].lastTs = ev.timestamp;
            map[ev.task_id].lastStatus = ev.status;
            if (ev.event_type === 'completed' || ev.event_type === 'failed' || ev.event_type === 'timed_out') {
                map[ev.task_id].terminalEvent = ev.event_type;
            }
        });
        return Object.values(map).sort((a, b) => new Date(b.lastTs) - new Date(a.lastTs));
    }, [chatEvents]);

    const agents = useMemo(() => {
        const s = new Set();
        taskMap.forEach(t => t.agents.forEach(a => s.add(a)));
        return Array.from(s).filter(a => a !== 'api_gateway' && a !== 'user' && a !== 'system');
    }, [taskMap]);

    const filtered = taskMap.filter(t => {
        if (filterAgent !== 'all' && !t.agents.has(filterAgent)) return false;
        if (filterStatus !== 'all') {
            if (filterStatus === 'active' && t.terminalEvent) return false;
            if (filterStatus === 'completed' && !t.terminalEvent) return false;
        }
        return true;
    });

    const isActive = (t) => !t.terminalEvent && activeTasks.includes(t.task_id);

    return (
        <div className="p-8 fade-in">
            <div className="flex items-center justify-between mb-6">
                <div>
                    <h1 className="text-2xl font-bold tracking-tight mb-1">Task Registry</h1>
                    <p className="text-slate-400 text-sm">{taskMap.length} tasks tracked · {activeTasks.length} active</p>
                </div>
                <div className="flex items-center gap-3">
                    <select value={filterAgent} onChange={e => setFilterAgent(e.target.value)} className="bg-slate-900/60 border border-slate-700/60 rounded-xl py-2 px-3 text-sm text-slate-300 outline-none focus:border-brand-500">
                        <option value="all">All Agents</option>
                        {agents.map(a => <option key={a} value={a}>{a}</option>)}
                    </select>
                    <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} className="bg-slate-900/60 border border-slate-700/60 rounded-xl py-2 px-3 text-sm text-slate-300 outline-none focus:border-brand-500">
                        <option value="all">All Status</option>
                        <option value="active">Active</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
            </div>

            <div className="space-y-2">
                {filtered.length === 0 && (
                    <div className="glass-bright rounded-2xl p-12 text-center">
                        <ListChecks size={36} className="text-slate-600 mx-auto mb-3" />
                        <p className="text-slate-500">No tasks found</p>
                    </div>
                )}
                {filtered.map(task => {
                    const active = isActive(task);
                    const isExpanded = expandedTask === task.task_id;
                    const taskMsg = task.events.find(e => e.agent_role === 'user')?.message || task.events[0]?.message || 'Unknown task';
                    const agentList = Array.from(task.agents).filter(a => a !== 'api_gateway' && a !== 'system');

                    return (
                        <div key={task.task_id} className={`glass-bright rounded-2xl border transition-all ${active ? 'border-brand-500/25 glow-blue' : 'border-slate-800/40'}`}>
                            <button onClick={() => setExpandedTask(isExpanded ? null : task.task_id)} className="w-full text-left p-4 task-row rounded-2xl">
                                <div className="flex items-center gap-4">
                                    <div className="flex items-center gap-2 shrink-0">
                                        {active
                                            ? <div className="w-2 h-2 rounded-full bg-brand-500 pulse-dot" />
                                            : <div className={`w-2 h-2 rounded-full ${task.terminalEvent === 'completed' ? 'bg-emerald-400' : task.terminalEvent === 'failed' || task.terminalEvent === 'timed_out' ? 'bg-red-400' : 'bg-slate-500'}`} />
                                        }
                                        <StatusBadge status={task.terminalEvent || task.lastStatus || 'dispatched'} />
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <p className="text-sm text-slate-200 truncate">{taskMsg}</p>
                                        <div className="flex items-center gap-3 mt-1">
                                            <span className="text-[10px] text-slate-600 font-mono">{task.task_id.slice(0, 12)}…</span>
                                            <div className="flex items-center gap-1">
                                                {agentList.slice(0, 4).map(a => {
                                                    const ag = AGENT_LIST.find(x => x.id === a);
                                                    return ag ? <span key={a} className={`text-[10px] font-semibold ${ag.color}`}>@{a}</span> : null;
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4 shrink-0 text-xs text-slate-500">
                                        <span>{task.events.length} events</span>
                                        <span>{timeAgo(task.lastTs)}</span>
                                        {isExpanded ? <ChevronUp size={14} /> : <ChevronDown size={14} />}
                                    </div>
                                </div>
                            </button>

                            {isExpanded && (
                                <div className="px-4 pb-4 border-t border-slate-800/40 pt-3">
                                    <div className="space-y-1.5 max-h-72 overflow-y-auto scrollbar-thin">
                                        {task.events.map((ev, i) => (
                                            <div key={i} className="flex items-start gap-3 py-1.5 border-b border-slate-800/30 last:border-0 text-xs slide-in">
                                                <span className="text-[10px] text-slate-600 font-mono w-20 shrink-0 pt-0.5">{fmtTime(ev.timestamp)}</span>
                                                <StatusBadge status={ev.status || ev.event_type} />
                                                <span className={`text-[10px] font-bold w-28 shrink-0 truncate ${statusColor(ev.status)}`}>{ev.agent_role}</span>
                                                <span className="text-slate-300 flex-1 leading-relaxed">{ev.message}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    );
                })}
            </div>
        </div>
    );
};

// ─── Main App (assumes authenticated) ────────────────────────────────────────
const App = ({ initialUser }) => {
    const [view, setView] = useState('home');
    const [selectedAgent, setSelectedAgent] = useState(null);
    const [logs, setLogs] = useState([]);
    const [trackerEntries, setTrackerEntries] = useState([]);
    const [chatMessage, setChatMessage] = useState('');
    const [user, setUser] = useState(initialUser);
    const [loading, setLoading] = useState(true);
    const [showSuggestions, setShowSuggestions] = useState(false);
    const [filteredAgents, setFilteredAgents] = useState([]);
    const [chatEvents, setChatEvents] = useState([]);
    const [activeTasks, setActiveTasks] = useState([]);
    const [agentMetrics, setAgentMetrics] = useState(null);
    const [preflight, setPreflight] = useState(null);
    const [goalBusy, setGoalBusy] = useState(false);
    const [goalDraft, setGoalDraft] = useState({
        metric: '',
        targetValue: '',
        comparator: 'gte',
        maxAttempts: '3',
        retryDelaySeconds: '0',
        enabled: true,
    });

    const scrollRef = useRef(null);
    const textareaRef = useRef(null);
    const chatEventsRef = useRef(new Set());
    const authFailureHandledRef = useRef(false);

    // Load saved state and start polling
    useEffect(() => {
        const savedState = localStorage.getItem(CHAT_STATE_KEY);
        if (savedState) {
            try {
                const p = JSON.parse(savedState);
                if (Array.isArray(p.chatEvents)) mergeChatEvents(p.chatEvents);
                if (Array.isArray(p.activeTasks)) setActiveTasks(p.activeTasks.slice(0, 25));
            } catch {}
        }
        const session = getSession();
        if (session?.token) {
            refreshAll(session.token);
            const iv = setInterval(() => refreshAll(session.token), 5000);
            return () => clearInterval(iv);
        }
        setLoading(false);
    }, []);

    const getSession = () => {
        try { const r = localStorage.getItem('tm_session'); return r ? JSON.parse(r) : null; } catch { return null; }
    };

    const clearSession = () => {
        localStorage.removeItem('tm_session'); localStorage.removeItem(CHAT_STATE_KEY);
        window.location.reload();
    };

    const handleAuthFailure = (reason = 'Session expired. Please login again.') => {
        if (authFailureHandledRef.current) return;
        authFailureHandledRef.current = true;
        appendSystemEvent(reason, 'error');
        setTimeout(clearSession, 1500);
    };

    const handleLogout = () => { localStorage.removeItem('tm_session'); localStorage.removeItem(CHAT_STATE_KEY); window.location.reload(); };

    const authFetch = async (url, token, opts = {}) => {
        const res = await fetch(url, { ...opts, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) } });
        if (res.status === 401) { const d = await res.json().catch(() => ({})); handleAuthFailure(d.detail || 'Session expired'); return null; }
        return res;
    };

    const parseGoalTargetValue = (raw) => {
        const trimmed = String(raw ?? '').trim();
        if (!trimmed) return '';
        if (/^-?\d+(\.\d+)?$/.test(trimmed)) return Number(trimmed);
        if (trimmed.toLowerCase() === 'true') return true;
        if (trimmed.toLowerCase() === 'false') return false;
        return trimmed;
    };

    const fetchAgentGoalTarget = async (agentId) => {
        const session = getSession();
        if (!session?.token || !agentId) return;
        try {
            const res = await authFetch(`${API_BASE}/agents/${agentId}/goal-target`, session.token);
            if (!res) return;
            const data = await res.json();
            const goal = data?.goal_target;
            if (!goal) {
                setGoalDraft({
                    metric: '',
                    targetValue: '',
                    comparator: 'gte',
                    maxAttempts: '3',
                    retryDelaySeconds: '0',
                    enabled: true,
                });
                return;
            }
            setGoalDraft({
                metric: String(goal.metric ?? ''),
                targetValue: String(goal.target_value ?? ''),
                comparator: String(goal.comparator ?? 'gte'),
                maxAttempts: String(goal.max_attempts ?? 3),
                retryDelaySeconds: String(goal.retry_delay_seconds ?? 0),
                enabled: goal.enabled !== false,
            });
        } catch {}
    };

    const saveAgentGoalTarget = async () => {
        if (!selectedAgent?.id) return;
        const session = getSession();
        if (!session?.token) { handleAuthFailure('Missing session. Please login.'); return; }
        const payload = {
            metric: goalDraft.metric.trim(),
            target_value: parseGoalTargetValue(goalDraft.targetValue),
            comparator: goalDraft.comparator,
            max_attempts: Number(goalDraft.maxAttempts || 3),
            retry_delay_seconds: Number(goalDraft.retryDelaySeconds || 0),
            enabled: !!goalDraft.enabled,
        };
        if (!payload.metric || payload.target_value === '') {
            appendSystemEvent('Goal metric and target value are required.', 'error');
            return;
        }
        setGoalBusy(true);
        try {
            const res = await authFetch(`${API_BASE}/agents/${selectedAgent.id}/goal-target`, session.token, {
                method: 'POST',
                body: JSON.stringify(payload),
            });
            if (!res) return;
            const data = await res.json();
            if (!res.ok) throw new Error(data?.detail || 'Failed to save goal target');
            appendSystemEvent(`Goal target saved for ${selectedAgent.id}`, 'success');
            fetchAgentGoalTarget(selectedAgent.id);
        } catch (e) {
            appendSystemEvent(`Goal save failed: ${e.message}`, 'error');
        } finally {
            setGoalBusy(false);
        }
    };

    const clearAgentGoalTarget = async () => {
        if (!selectedAgent?.id) return;
        const session = getSession();
        if (!session?.token) { handleAuthFailure('Missing session. Please login.'); return; }
        setGoalBusy(true);
        try {
            const res = await authFetch(`${API_BASE}/agents/${selectedAgent.id}/goal-target`, session.token, { method: 'DELETE' });
            if (!res) return;
            const data = await res.json();
            if (!res.ok) throw new Error(data?.detail || 'Failed to clear goal target');
            setGoalDraft({
                metric: '',
                targetValue: '',
                comparator: 'gte',
                maxAttempts: '3',
                retryDelaySeconds: '0',
                enabled: true,
            });
            appendSystemEvent(`Goal target cleared for ${selectedAgent.id}`, 'info');
        } catch (e) {
            appendSystemEvent(`Goal clear failed: ${e.message}`, 'error');
        } finally {
            setGoalBusy(false);
        }
    };

    const refreshAll = async (token) => {
        await Promise.all([
            refreshCoreData(token),
            fetchChatEvents(token),
            fetchMetrics(token),
            fetchPreflight(token),
        ]);
        setLoading(false);
    };

    const refreshCoreData = async (token) => {
        try {
            const [lRes, tRes] = await Promise.all([
                authFetch(`${API_BASE}/logs`, token),
                authFetch(`${API_BASE}/tracker/entries`, token),
            ]);
            if (lRes) { const l = await lRes.json(); if (Array.isArray(l)) setLogs(l); }
            if (tRes) { const t = await tRes.json(); if (Array.isArray(t)) setTrackerEntries(t); }
        } catch {}
    };

    const fetchMetrics = async (token) => {
        try {
            const res = await authFetch(`${API_BASE}/metrics/agent-efficiency-matrix`, token);
            if (res) { const d = await res.json(); setAgentMetrics(d); }
        } catch {}
    };

    const fetchPreflight = async (token) => {
        try {
            const res = await authFetch(`${API_BASE}/diagnostics/preflight`, token);
            if (res) { const d = await res.json(); setPreflight(d); }
        } catch {}
    };

    const mergeChatEvents = (events = []) => {
        setChatEvents(prev => {
            const merged = [...prev];
            events.forEach(ev => {
                const key = eventKey(ev);
                if (!chatEventsRef.current.has(key)) { chatEventsRef.current.add(key); merged.push(ev); }
            });
            merged.sort((a, b) => new Date(a.timestamp || 0) - new Date(b.timestamp || 0));
            return merged.slice(-300);
        });
    };

    const appendSystemEvent = (message, status = 'error') => {
        mergeChatEvents([{ timestamp: new Date().toISOString(), task_id: '', agent_role: 'system', event_type: 'ui_notice', status, message }]);
    };

    useEffect(() => {
        localStorage.setItem(CHAT_STATE_KEY, JSON.stringify({ chatEvents: chatEvents.slice(-200), activeTasks: activeTasks.slice(0, 25) }));
    }, [chatEvents, activeTasks]);

    useEffect(() => {
        const el = scrollRef.current;
        if (el) el.scrollTop = el.scrollHeight;
    }, [chatEvents]);

    const fetchTaskEvents = async (taskId) => {
        const session = getSession();
        if (!session?.token || !taskId) return;
        const res = await authFetch(`${API_BASE}/task/${taskId}/events?limit=300`, session.token);
        if (res) { const d = await res.json(); if (Array.isArray(d?.events)) mergeChatEvents(d.events); }
    };

    const fetchChatEvents = async (token) => {
        if (!token) return;
        const res = await authFetch(`${API_BASE}/chat/events?limit=300`, token);
        if (res) { const d = await res.json(); if (Array.isArray(d?.events)) mergeChatEvents(d.events); }
    };

    useEffect(() => {
        if (!activeTasks.length) return;
        const iv = setInterval(() => activeTasks.forEach(fetchTaskEvents), 1500);
        return () => clearInterval(iv);
    }, [activeTasks]);

    // Clean up completed/failed/timed-out tasks from activeTasks so we stop polling them
    useEffect(() => {
        if (!activeTasks.length || !chatEvents.length) return;
        const terminalTaskIds = new Set(
            chatEvents
                .filter(ev => ev.task_id && ['completed','failed','timed_out'].includes(ev.event_type))
                .map(ev => ev.task_id)
        );
        if (!terminalTaskIds.size) return;
        setActiveTasks(prev => {
            const next = prev.filter(id => !terminalTaskIds.has(id));
            return next.length !== prev.length ? next : prev;
        });
    }, [chatEvents]);

    useEffect(() => {
        const session = getSession();
        if (!session?.token) return;
        const iv = setInterval(() => fetchChatEvents(session.token), 3000);
        return () => clearInterval(iv);
    }, []);

    useEffect(() => {
        if (!selectedAgent?.id || !isMarketingAgentId(selectedAgent.id)) return;
        fetchAgentGoalTarget(selectedAgent.id);
    }, [selectedAgent?.id]);

    const sendTask = async (agentId, type, payload = {}) => {
        const session = getSession();
        if (!session?.token) { handleAuthFailure('Missing session. Please login.'); return null; }
        try {
            const res = await fetch(`${API_BASE}/task`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.token}` },
                body: JSON.stringify({ agent_role: agentId, task_type: type, payload })
            });
            const data = await res.json();
            if (res.status === 401) { handleAuthFailure(data?.detail || 'Session expired'); return null; }
            if (!res.ok) throw new Error(data?.detail || `Error ${res.status}`);
            const t = getSession(); if (t) refreshCoreData(t.token);
            return data;
        } catch (e) {
            appendSystemEvent(`Dispatch failed: ${e.message}`, 'error');
            return null;
        }
    };

    const handleChatChange = (e) => {
        const val = e.target.value;
        setChatMessage(val);
        if (textareaRef.current) { textareaRef.current.style.height = 'auto'; textareaRef.current.style.height = textareaRef.current.scrollHeight + 'px'; }
        const lastAt = val.lastIndexOf('@');
        if (lastAt !== -1 && lastAt === val.length - 1) { setShowSuggestions(true); setFilteredAgents(AGENT_LIST); }
        else if (lastAt !== -1 && lastAt < val.length - 1) {
            const q = val.slice(lastAt + 1).toLowerCase();
            const f = AGENT_LIST.filter(a => a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q));
            setFilteredAgents(f); setShowSuggestions(f.length > 0);
        } else { setShowSuggestions(false); }
    };

    const selectAgent = (agent) => {
        const lastAt = chatMessage.lastIndexOf('@');
        setChatMessage(chatMessage.slice(0, lastAt) + '@' + agent.id + ' ');
        setShowSuggestions(false); setSelectedAgent(agent);
        if (textareaRef.current) textareaRef.current.focus();
    };

    const handleChatSubmit = async (e) => {
        if (e) e.preventDefault();
        if (!chatMessage.trim()) return;

        let targetId = selectedAgent?.id || 'server_agent';
        let cleanMessage = chatMessage;

        const match = chatMessage.match(/@(\w+)/);
        if (match) {
            const mentioned = match[1];
            const mapped = AGENT_ALIASES[mentioned] || mentioned;
            if (AGENT_LIST.find(a => a.id === mapped)) { targetId = mapped; cleanMessage = chatMessage.replace(`@${mentioned}`, '').trim(); }
        }

        mergeChatEvents([{ timestamp: new Date().toISOString(), task_id: '', agent_role: 'user', event_type: 'user_command', status: 'info', message: cleanMessage, payload: { target_agent: targetId } }]);

        const result = await sendTask(targetId, 'manual_command', { command: cleanMessage });
        if (result?.task_id) {
            appendSystemEvent(`Task sent to ${targetId} (${result.task_id.slice(0, 8)})`, 'info');
            setActiveTasks(prev => Array.from(new Set([result.task_id, ...prev])).slice(0, 25));
            fetchTaskEvents(result.task_id);
        }
        setChatMessage(''); setShowSuggestions(false);
        if (textareaRef.current) textareaRef.current.style.height = 'auto';
    };

    const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleChatSubmit(); }
        else if (e.key === 'Escape') setShowSuggestions(false);
    };

    if (loading) return (
        <div className="h-screen bg-surface-900 flex items-center justify-center">
            <div className="flex flex-col items-center gap-4">
                <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-brand-500 to-indigo-600 flex items-center justify-center animate-pulse">
                    <BrainCircuit size={28} className="text-white" />
                </div>
                <p className="text-slate-400 text-sm">Initializing swarm…</p>
            </div>
        </div>
    );

    return (
        <div className="flex h-screen overflow-hidden bg-surface-900">
            <Sidebar view={view} setView={setView} selectedAgent={selectedAgent} setSelectedAgent={setSelectedAgent} agentMetrics={agentMetrics} />
            <div className="flex-1 flex flex-col min-w-0 overflow-hidden">
                <Header view={view} selectedAgent={selectedAgent} user={user} onLogout={handleLogout} agentMetrics={agentMetrics} loading={loading} />
                <div className="flex-1 overflow-y-auto scrollbar-thin">
                    {view === 'home' && <HomeView logs={logs} agentMetrics={agentMetrics} preflight={preflight} chatEvents={chatEvents} />}
                    {view === 'swarm' && (
                        <SwarmView
                            logs={logs} chatEvents={chatEvents} activeTasks={activeTasks}
                            selectedAgent={selectedAgent} chatMessage={chatMessage}
                            setChatMessage={setChatMessage} handleChatSubmit={handleChatSubmit}
                            handleChatChange={handleChatChange} handleKeyDown={handleKeyDown}
                            showSuggestions={showSuggestions} filteredAgents={filteredAgents}
                            selectAgent={selectAgent} textareaRef={textareaRef} scrollRef={scrollRef}
                            goalDraft={goalDraft} setGoalDraft={setGoalDraft}
                            onSaveGoalTarget={saveAgentGoalTarget}
                            onClearGoalTarget={clearAgentGoalTarget}
                            goalBusy={goalBusy}
                        />
                    )}
                    {view === 'agents' && <AgentsView agentMetrics={agentMetrics} />}
                    {view === 'tasks'  && <TasksView chatEvents={chatEvents} activeTasks={activeTasks} />}
                    {view === 'tracker' && <TrackerView entries={trackerEntries} />}
                </div>
            </div>
        </div>
    );
};

// ─── Login Bridge ─────────────────────────────────────────────────────────────
// Override LoginPage to work with actual auth
const AppWithLogin = () => {
    const [isLoggedIn, setIsLoggedIn] = useState(false);
    const [user, setUser] = useState(null);
    const [loading, setLoading] = useState(true);
    const [googleEnabled, setGoogleEnabled] = useState(false);
    const [googleClientId, setGoogleClientId] = useState(FALLBACK_GOOGLE_CLIENT_ID);

    useEffect(() => {
        const saved = localStorage.getItem('tm_session');
        if (saved) { try { const s = JSON.parse(saved); setIsLoggedIn(true); setUser(s.user); } catch {} }
        setLoading(false);
        fetch(`${API_BASE}/auth/google-config`).then(r=>r.json()).then(d=>{ if(d?.enabled && d?.client_id){ setGoogleEnabled(true); setGoogleClientId(d.client_id); } }).catch(()=>{});
    }, []);

    if (loading) return <div className="h-screen bg-surface-900 flex items-center justify-center"><div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-brand-500 to-indigo-600 flex items-center justify-center animate-pulse"><BrainCircuit size={28} className="text-white" /></div></div>;

    if (!isLoggedIn) return <LoginPage onLogin={(data)=>{ localStorage.setItem('tm_session', JSON.stringify(data)); setIsLoggedIn(true); setUser(data.user); window.location.reload(); }} googleEnabled={googleEnabled} googleClientId={googleClientId} />;
    return <App initialUser={user} />;
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AppWithLogin />);
</script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
