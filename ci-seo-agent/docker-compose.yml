services:
  chroma:
    image: chromadb/chroma:0.6.3
    container_name: ci-agents
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    restart: always

networks:
  default:
    name: ci-seo-network
